<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title> Background </title>
	<style>
		body{
			background-image: url('Muka3.jpg');
			background-size: cover;
			background-position: center;
			background-repeat: no-repeat;
			min-height: auto;
			margin: 0;
			padding: 0;
			overflow: hidden;
		}
		.container{
			display: flex;
			align-items: center;
			height: 100vh;
		}
		.left{
			width: 45%;
			display: flex;
			justify-content: flex-end;
			align-items: center;
			text-align: left;
			padding-right: 40px;
			flex-direction: column;
			color: white;
		}
		.right{
			width: 55%;
			display: flex;
			justify-content: flex-start;
			align-items: center;
			text-align: left;
			padding-left: 30px;
			flex-direction: column;
			color: white;
		}
		h1{
			margin-top: 0px;
			font-size: 50px;
			color: white;
		}
		p{
			margin-bottom:0px;
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="left">
			<p> Hei, I'm Sheva Iqbal
			<h1>Welcome to My Web</h1>
		</div>
</body>
</html>
