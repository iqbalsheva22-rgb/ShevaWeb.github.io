<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" type="text/css">
    <style>
        body{
			background-image: url('Muka3.jpg');
			background-size: cover;
			background-position: center;
			background-repeat: no-repeat;
            background-attachment: fixed;
        }
        .menu-home {
            position: fixed;
            top: 30px;
            left: 20px;
            background-color: #007bff;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 16px;
            z-index: 9999;
            transition: background-color 0.3s ease;
        }
        .menu-home:hover {
            background-color: #0056b3;
        }
        .contact{
            width:500px;
            margin-top:50px;
            margin-left:30%;
            border-radius: 5px;
            border: 2px lightblue solid;
            box-shadow: 0 10px 30px rgba(6, 176, 206, 0.87);
            padding: 20px;
            background-color: white;
        }
        .title{
            text-align: center;
            font-size: 30px;
            margin: 0;
        }
        hr{
            margin-bottom: 20px;
        }
        .form-input{
            width: 100%;
            padding: 12px;
            border: 1px lightblue solid;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 16px;
            margin-top: 6px;
        }
        textarea{
            height: 100px;
        }
        .send{
            background-color: lightblue;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .send:hover{
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <a href="Home.html" class="menu-home">HOME</a>
    <div class="contact">
        <h2 class="title">Contact Me</h2>
        <hr>
        <form action="mailto:iqbalsheva44@gmail.com" method="post">
            <label> First Name</label>
            <input type="text" name="first_name" class="form-input" placeholder="Your first name.." autocomplete="off" required>
            <label> Last Name </label>
            <input type="text" name="last_name" class="form-input" placeholder="Your last name.." autocomplete="off" required>
            <label>Message</label>
            <textarea name="message" class="form-input" placeholder="Write your message here.." autocomplete="off"></textarea>
            <input type="submit" name="send" class="send" value="send">
        </form>
    </div>
</body>
</html>
